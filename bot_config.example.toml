# MM Bot — example config. Copy to bot_config.toml and edit.
# For parameter explanations and tuning advice see TUNING.md.

[strategy]

prop_maintain = 0.2          # cancel threshold (see TUNING.md)
reconcile_interval = 30      # seconds between orphan checks

max_position = 10000         # max inventory in base token units
prop_skew_entry = 0.5        # skew aggressiveness when building position
prop_skew_exit = 0.5         # skew aggressiveness when unwinding position
quantity = 400               # order size per side per level (base token units)

quoter_type = "skew"
quoters_bps = [5, 15]        # baseline edge levels in bps — one bid/ask pair each

# Market address — find yours at:
# https://github.com/Kuru-Labs/kuru-exchange-server/blob/master/config/markets.toml
market_address = "0x..."

# Oracle: "kuru" (recommended) or "coinbase"
oracle_source = "kuru"
kuru_symbol = "mon_ausd"     # symbol from markets.toml above
kuru_depth_state = "proposed" # proposed | voted | finalized | committed (see TUNING.md)

# oracle_source = "coinbase"
# coinbase_symbol = "MON-USD"

# override_start_position = 0.0   # force a starting position on restart


# --- Per-quoter config (optional, overrides quoters_bps above) ---
# Use [[strategy.quoters]] for independent params per level or mixed quoter types.
#
# [[strategy.quoters]]
# type = "skew"
# baseline_edge_bps = 5.0
# quantity = 500
# prop_skew_entry = 0.3
# prop_skew_exit = 0.7
#
